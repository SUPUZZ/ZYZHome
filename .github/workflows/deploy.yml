name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate sitemap.xml
        run: |
          if [ -f sitemap.xml ]; then
            echo "Sitemap found."
            grep -c "<loc>" sitemap.xml || true
          else
            echo "Warning: sitemap.xml not found"
          fi

      - name: Validate robots.txt
        run: |
          if [ -f robots.txt ]; then
            echo "robots.txt found."
          else
            echo "Warning: robots.txt not found"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        run: |
          echo "Deployed to: ${{ steps.deployment.outputs.page_url }}"
